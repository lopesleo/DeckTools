name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create plugin zip
        run: |
          mkdir -p DeckTools
          cp plugin.json DeckTools/
          cp main.py DeckTools/
          cp package.json DeckTools/
          cp -r dist DeckTools/
          cp -r backend DeckTools/
          # Remove __pycache__ and .pyc files
          find DeckTools -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          find DeckTools -name '*.pyc' -delete 2>/dev/null || true
          zip -r DeckTools.zip DeckTools/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DeckTools.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
